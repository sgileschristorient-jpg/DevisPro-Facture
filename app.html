<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger DevisPro - L'Arsenal de Facturation</title>
    
    <!-- OpenGraph / WhatsApp / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sgileschristorient-jpg.github.io/DevisPro-Facture/app.html">
    <meta property="og:title" content="🚀 Téléchargez DevisPro - Facturation d'Élite">
    <meta property="og:description" content="L'outil indispensable pour les commerçants modernes. Factures pros en 2 minutes, signature client et gestion de stock.">
    <meta property="og:image" content="https://sgileschristorient-jpg.github.io/DevisPro-Facture/assets/img/logo.png">
    <meta property="og:site_name" content="DevisPro">
    
    <!-- Redirection automatique -->
    <meta http-equiv="refresh" content="1;url=https://play.google.com/store/apps/details?id=com.devispro.facture">

    <style>
        body {
            background-color: #020408;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .logo {
            width: 120px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #94A3B8; font-size: 16px; }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #6366F1;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <img src="assets/img/logo.png" alt="DevisPro Logo" class="logo">
    <h1>Préparation de votre arsenal...</h1>
    <p>Redirection vers le Google Play Store en cours.</p>
    <div class="loader"></div>

    <script>
        // Sécurité supplémentaire : redirection JS
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=com.devispro.facture";
        }, 1500);
    </script>
</body>
</html>
